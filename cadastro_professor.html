<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastro de Professor - Portfólio</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MeuPortfólio</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro_aluno.html">Alunos</a></li>
                <li><a href="cadastro_professor.html" class="active">Professores</a></li>
            </ul>
        </nav>
    </header>
    <!-- Nome completo, CPF, endereço, telefone, Departamento, Titulação (Mestre/Doutor), 
    E-mail Institucional e Área de atuação.
    -->
    <main class="container">
        <h2>Cadastro de Professor</h2>
        <form id="form-professor">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="form-group">
                    <label for="tel">Telefone:</label>
                    <input type="tel" id="tel" name="tel" required placeholder="(55) 99999-9999">
                </div>
            </div>

            <div class="form-group">
                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="depto">Departamento:</label>
                    <input type="text" id="depto" name="depto" required>
                </div>
                <div class="form-group">
                    <label for="titulacao">Titulação:</label>
                    <select id="titulacao" name="titulacao" required>
                        <option value="">Selecione...</option>
                        <option value="mestre">Mestre</option>
                        <option value="doutor">Doutor</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="email">E-mail Institucional:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="atuacao">Área de Atuação:</label>
                <input type="text" id="atuacao" name="atuacao" required>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar Professor</button>
        </form>
    </main>

    <footer>
        <p>&copy; Desenvolvido por João Pedro Toaldo.<br>2026 - UFN - Sistemas de Informação</p>
    </footer>
</body>
</html>
