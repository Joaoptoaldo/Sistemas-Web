<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <title>Cadastro de Aluno - Portfólio</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MeuPortfólio</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro_aluno.html" class="ativo">Alunos</a></li>
                <li><a href="cadastro_professor.html">Professores</a></li>
            </ul>
        </nav>
    </header>
    <!-- Nome completo, Matrícula, Curso, Semestre de ingresso, E-mail e Telefone-->
    <main class="container">
        <h2>Cadastro de Aluno</h2>
        <form class="form">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>

            <div class="form-grupo">
                <label for="matricula">Matrícula:</label>
                <input type="text" id="matricula" name="matricula" required placeholder="00000000">
            </div>

            <div class="form-linha">
                <div class="form-grupo">
                    <label for="curso">Curso:</label>
                    <input type="text" id="curso" name="curso" required placeholder="Sistemas de Informação">
                </div>
                <div class="form-grupo">
                    <label for="semestre">Semestre de Ingresso:</label>
                    <input type="text" id="semestre" name="semestre" required placeholder="2026/1">
                </div>
            </div>

            <div class="form-grupo">
                <label for="email">E-mail Institucional:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-grupo">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required placeholder="(55) 99999-9999">
            </div>

            <button type="submit" class="btn-enviar">Cadastrar Aluno</button>
        </form>
    </main>

    <footer>
        <p class="copy">&copy; Desenvolvido por João Pedro Toaldo.<br>2026 - UFN - Sistemas de Informação</p>
    </footer>
</body>
</html>
